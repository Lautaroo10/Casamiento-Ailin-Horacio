<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casamiento Ailin y Horacio</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Abel&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <section id="splash" class="splash">
        <img class="logo" src="../images/Logo.png" alt="Logo">
    </section>


    <main id="content" class="content">

        <div class="primera-parte">
            <div class="texto">
                <h1>AILIN & HORACIO</h1>
                <P class="fecha">15 · 08 · 2026</P>
            </div>
        </div>

        <div class="segunda-parte">
            <img class="logo-chico" src="../images/Logo.png" alt="logo">
        </div>


        <p class="frase">¡Al fin llego el momento y queremos celebrar este día con quienes más queremos!</p>
        <img class="bebidas" src="../images/bebida.png" alt="img-bebida">

        <!-- Carrusel deslizable -->
        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-slide">
                    <img src="../images/carrusel 1.png" alt="Foto 1" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 2.png" alt="Foto 2" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 3.png" alt="Foto 3" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 4.png" alt="Foto 4" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 5.png" alt="Foto 5" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 6.png" alt="Foto 6" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 7.png" alt="Foto 7" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 8.png" alt="Foto 8" draggable="false">
                </div>
                <div class="carousel-slide">
                    <img src="../images/carrusel 9.png" alt="Foto 9" draggable="false">
                </div>
            </div>
        </div>

        <div class="como-llegar">
            <img src="../images/CEREMONIA RELIGIOSA.png" alt="iglesia">
            <img src="../images/CELEBRACIÓN.png" alt="lugar-celebracion">
            <a
                href="https://www.google.com/maps/place/El+faro+club+nautico/@-27.3450819,-58.6379225,17z/data=!3m1!4b1!4m6!3m5!1s0x9445395a91d4df97:0x3c790fceff4f1d0!8m2!3d-27.3450819!4d-58.6353476!16s%2Fg%2F11h8wnbm_1?entry=tts&g_ep=EgoyMDI2MDQyMS4wIPu8ASoASAFQAw%3D%3D&skid=6f60f46f-706f-4261-921f-2a069cb65a8a">
                <button class="btn-llegar">COMO LLEGAR</button>
            </a>
        </div>


    </main>

    <script src="../js/main.js"></script>
</body>



</html>
